name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Coverage-backed unit + integration suite
        run: make test-cov

  sample-graphs:
    name: Sample Graphs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: In-process sample graph validation
        run: make test-samples

  seekdb-validation:
    name: SeekDB Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      github.ref_name == 'develop' ||
      github.ref_name == 'main' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'hotfix/')
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: seekdb
            docker_backend: seekdb
            image: oceanbase/seekdb:latest
            user: root
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root:@127.0.0.1:2881/seekdb
          - name: oceanbase
            docker_backend: oceanbase
            image: oceanbase/oceanbase-ce:latest
            mode: slim
            user: root@test
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root%40test:@127.0.0.1:2881/seekdb
          - name: mysql
            docker_backend: mysql
            image: mysql:8.4
            user: root
            password: root
            port: "3306"
            db_name: seekdb
            url: mysql+aiomysql://root:root@127.0.0.1:3306/seekdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: SeekDB/OceanBase smoke and e2e validation (${{ matrix.backend.name }})
        env:
          SEEKDB_MODE: docker
          SEEKDB_DOCKER_BACKEND: ${{ matrix.backend.docker_backend }}
          SEEKDB_DOCKER_IMAGE: ${{ matrix.backend.image }}
          OCEANBASE_DOCKER_MODE: ${{ matrix.backend.mode || '' }}
          OCEANBASE_USER: ${{ matrix.backend.user }}
          OCEANBASE_PASSWORD: ${{ matrix.backend.password }}
          OCEANBASE_PORT: ${{ matrix.backend.port }}
          OCEANBASE_DB_NAME: ${{ matrix.backend.db_name }}
          SEEKDB_URL: ${{ matrix.backend.url }}
        run: make test-seekdb
