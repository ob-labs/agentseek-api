name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Coverage-backed unit + integration suite
        run: make test-cov

  cli-compatibility:
    name: CLI Compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Installed CLI reports version
        run: uv run agentseek version

      - name: CLI auto-discovers agentseek.json for dockerfile
        run: uv run python scripts/test_cli_config_autodiscovery.py

      - name: Dockerfile command renders a runnable config
        run: >-
          uv run python -c
          "from pathlib import Path; import subprocess; out = Path('.tmp/agentseek.Dockerfile'); out.parent.mkdir(exist_ok=True); subprocess.run(['uv', 'run', 'agentseek', 'dockerfile', '--config', 'examples/external_graph/manifest.json', str(out)], check=True); text = out.read_text(encoding='utf-8'); assert 'ENV PYTHONPATH=/deps/agent' in text; assert 'ENV AGENTSEEK_GRAPHS=/deps/agent/examples/external_graph/manifest.json' in text"

      - name: CLI serve smoke boots a live API
        if: runner.os == 'Linux' || (runner.os == 'macOS' && runner.arch == 'ARM64')
        run: uv run python scripts/test_cli_serve_smoke.py

      - name: CLI config and Docker planning tests
        run: uv run pytest tests/unit/test_cli.py tests/unit/test_graph_manifest.py -q

  cli-docker-runtime:
    name: CLI Docker Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: CLI Docker smoke
        run: make test-cli-docker

  sample-graphs:
    name: Sample Graphs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: In-process sample graph validation
        run: make test-samples

  cli-dev-sample-graphs:
    name: CLI Dev Sample Graphs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: seekdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run sample graphs through agentseek dev
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DB: seekdb
        run: make test-cli-dev-samples

  mysql-family-checkpoint-validation:
    name: MySQL-Family Checkpoint Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      github.ref_name == 'develop' ||
      github.ref_name == 'main' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'hotfix/')
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: seekdb
            docker_backend: seekdb
            image: oceanbase/seekdb:latest
            user: root
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root:@127.0.0.1:2881/seekdb
          - name: oceanbase
            docker_backend: oceanbase
            image: oceanbase/oceanbase-ce:latest
            mode: slim
            user: root@test
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root%40test:@127.0.0.1:2881/seekdb
          - name: mysql
            docker_backend: mysql
            image: mysql:8.4
            user: root
            password: root
            port: "3306"
            db_name: seekdb
            url: mysql+aiomysql://root:root@127.0.0.1:3306/seekdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: MySQL-family checkpoint validation (${{ matrix.backend.name }})
        env:
          SEEKDB_MODE: docker
          SEEKDB_DOCKER_BACKEND: ${{ matrix.backend.docker_backend }}
          SEEKDB_DOCKER_IMAGE: ${{ matrix.backend.image }}
          OCEANBASE_DOCKER_MODE: ${{ matrix.backend.mode || '' }}
          OCEANBASE_USER: ${{ matrix.backend.user }}
          OCEANBASE_PASSWORD: ${{ matrix.backend.password }}
          OCEANBASE_PORT: ${{ matrix.backend.port }}
          OCEANBASE_DB_NAME: ${{ matrix.backend.db_name }}
          SEEKDB_URL: ${{ matrix.backend.url }}
        run: make test-checkpoints

  pgsql-metadata-checkpoint-validation:
    name: PostgreSQL Metadata + Checkpoint Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      github.ref_name == 'develop' ||
      github.ref_name == 'main' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'hotfix/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentseek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentseek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: seekdb
            docker_backend: seekdb
            image: oceanbase/seekdb:latest
            user: root
            password: ""
            port: "2881"
            db_name: seekdb
          - name: oceanbase
            docker_backend: oceanbase
            image: oceanbase/oceanbase-ce:latest
            mode: slim
            user: root@test
            password: ""
            port: "2881"
            db_name: seekdb
          - name: mysql
            docker_backend: mysql
            image: mysql:8.4
            user: root
            password: root
            port: "3306"
            db_name: seekdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: PostgreSQL metadata with checkpoint validation (${{ matrix.backend.name }})
        env:
          SEEKDB_MODE: docker
          SEEKDB_DOCKER_BACKEND: ${{ matrix.backend.docker_backend }}
          SEEKDB_DOCKER_IMAGE: ${{ matrix.backend.image }}
          OCEANBASE_DOCKER_MODE: ${{ matrix.backend.mode || '' }}
          OCEANBASE_USER: ${{ matrix.backend.user }}
          OCEANBASE_PASSWORD: ${{ matrix.backend.password }}
          OCEANBASE_PORT: ${{ matrix.backend.port }}
          OCEANBASE_DB_NAME: ${{ matrix.backend.db_name }}
          METADATA_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/agentseek
          METADATA_DB_BACKEND: postgresql
        run: make test-checkpoints
