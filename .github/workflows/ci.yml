name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Coverage-backed unit + integration suite
        run: make test-cov

  cli-compatibility:
    name: CLI Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Installed CLI reports version
        run: uv run agentseek version

      - name: Dockerfile command renders a runnable config
        run: |
          mkdir -p .tmp
          uv run agentseek dockerfile --config examples/external_graph/manifest.json .tmp/agentseek.Dockerfile
          test -s .tmp/agentseek.Dockerfile
          grep -F 'ENV PYTHONPATH=/deps/agent' .tmp/agentseek.Dockerfile
          grep -F 'ENV AGENTSEEK_GRAPHS=/deps/agent/examples/external_graph/manifest.json' .tmp/agentseek.Dockerfile

      - name: CLI config and LangGraph compatibility tests
        run: make test-cli

  cli-docker-runtime:
    name: CLI Docker Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: CLI Docker smoke
        run: make test-cli-docker

  sample-graphs:
    name: Sample Graphs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: In-process sample graph validation
        run: make test-samples

  mysql-family-checkpoint-validation:
    name: MySQL-Family Checkpoint Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      github.ref_name == 'develop' ||
      github.ref_name == 'main' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'hotfix/')
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: seekdb
            docker_backend: seekdb
            image: oceanbase/seekdb:latest
            user: root
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root:@127.0.0.1:2881/seekdb
          - name: oceanbase
            docker_backend: oceanbase
            image: oceanbase/oceanbase-ce:latest
            mode: slim
            user: root@test
            password: ""
            port: "2881"
            db_name: seekdb
            url: mysql+aiomysql://root%40test:@127.0.0.1:2881/seekdb
          - name: mysql
            docker_backend: mysql
            image: mysql:8.4
            user: root
            password: root
            port: "3306"
            db_name: seekdb
            url: mysql+aiomysql://root:root@127.0.0.1:3306/seekdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: MySQL-family checkpoint validation (${{ matrix.backend.name }})
        env:
          SEEKDB_MODE: docker
          SEEKDB_DOCKER_BACKEND: ${{ matrix.backend.docker_backend }}
          SEEKDB_DOCKER_IMAGE: ${{ matrix.backend.image }}
          OCEANBASE_DOCKER_MODE: ${{ matrix.backend.mode || '' }}
          OCEANBASE_USER: ${{ matrix.backend.user }}
          OCEANBASE_PASSWORD: ${{ matrix.backend.password }}
          OCEANBASE_PORT: ${{ matrix.backend.port }}
          OCEANBASE_DB_NAME: ${{ matrix.backend.db_name }}
          SEEKDB_URL: ${{ matrix.backend.url }}
        run: make test-checkpoints

  pgsql-metadata-checkpoint-validation:
    name: PostgreSQL Metadata + Checkpoint Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      github.ref_name == 'develop' ||
      github.ref_name == 'main' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'hotfix/')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentseek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentseek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: seekdb
            docker_backend: seekdb
            image: oceanbase/seekdb:latest
            user: root
            password: ""
            port: "2881"
            db_name: seekdb
          - name: oceanbase
            docker_backend: oceanbase
            image: oceanbase/oceanbase-ce:latest
            mode: slim
            user: root@test
            password: ""
            port: "2881"
            db_name: seekdb
          - name: mysql
            docker_backend: mysql
            image: mysql:8.4
            user: root
            password: root
            port: "3306"
            db_name: seekdb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: PostgreSQL metadata with checkpoint validation (${{ matrix.backend.name }})
        env:
          SEEKDB_MODE: docker
          SEEKDB_DOCKER_BACKEND: ${{ matrix.backend.docker_backend }}
          SEEKDB_DOCKER_IMAGE: ${{ matrix.backend.image }}
          OCEANBASE_DOCKER_MODE: ${{ matrix.backend.mode || '' }}
          OCEANBASE_USER: ${{ matrix.backend.user }}
          OCEANBASE_PASSWORD: ${{ matrix.backend.password }}
          OCEANBASE_PORT: ${{ matrix.backend.port }}
          OCEANBASE_DB_NAME: ${{ matrix.backend.db_name }}
          METADATA_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/agentseek
          METADATA_DB_BACKEND: postgresql
        run: make test-checkpoints
